<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>01 Calculator | Omid Quraishi</title>
  </head>
  <body>
    <main>
      <div class="calculator">
        <div class="calculator-screen">
          <p class="calculator-screen-numbers"></p>
        </div>
        <div class="calculator-body">
          <span data-value="AC">AC</span>
          <span data-value="%">%</span>
          <span data-value="/">/</span>
          <span data-value="7">7</span>
          <span data-value="8">8</span>
          <span data-value="9">9</span>
          <span data-value="*">*</span>
          <span data-value="4">4</span>
          <span data-value="5">5</span>
          <span data-value="6">6</span>
          <span data-value="-">-</span>
          <span data-value="1">1</span>
          <span data-value="2">2</span>
          <span data-value="3">3</span>
          <span data-value="+">+</span>
          <span data-value="00">00</span>
          <span data-value="0">0</span>
          <span data-value=".">.</span>
          <span data-value="equal">=</span>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
